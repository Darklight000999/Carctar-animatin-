<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Identity</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #0f2027, #000000);
        font-family: Arial, sans-serif;
    }

    .title {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
        color: #00ffff;
        font-size: 28px;
        letter-spacing: 3px;
        text-shadow: 0 0 15px #00ffff;
    }
</style>
</head>
<body>

<div class="title">ETHICAL HACKER | CYBER SECURITY</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// LIGHTING
const light = new THREE.PointLight(0x00ffff, 2);
light.position.set(5, 5, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x111111);
scene.add(ambient);

// MATERIAL (Black Cyber Glow)
const material = new THREE.MeshStandardMaterial({
    color: 0x000000,
    emissive: 0x00ffff,
    emissiveIntensity: 0.25,
    roughness: 0.4,
    metalness: 0.6
});

// HEAD
const headGeometry = new THREE.CylinderGeometry(1, 1, 2.5, 32);
const head = new THREE.Mesh(headGeometry, material);
head.position.y = 2.5;
scene.add(head);

// BODY
const bodyGeometry = new THREE.BoxGeometry(2.5, 4, 1);
const body = new THREE.Mesh(bodyGeometry, material);
body.position.y = -0.5;
scene.add(body);

// LEGS
const legGeometry = new THREE.BoxGeometry(0.8, 3, 0.8);

const leftLeg = new THREE.Mesh(legGeometry, material);
leftLeg.position.set(-0.6, -3, 0);
scene.add(leftLeg);

const rightLeg = new THREE.Mesh(legGeometry, material);
rightLeg.position.set(0.6, -3, 0);
scene.add(rightLeg);

// ARMS
const armGeometry = new THREE.BoxGeometry(0.7, 3, 0.7);

const leftArm = new THREE.Mesh(armGeometry, material);
leftArm.position.set(-2, 0.5, 0);
scene.add(leftArm);

const rightArm = new THREE.Mesh(armGeometry, material);
rightArm.position.set(2, 0.5, 0);
scene.add(rightArm);

// PARTICLE BACKGROUND
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1000;

const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 30;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.05,
    color: 0x00ffff
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// MOUSE CONTROL
document.addEventListener('mousemove', (event) => {
    const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
    const mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

    head.rotation.y = mouseX;
    body.rotation.y = mouseX * 0.5;

    head.rotation.x = mouseY * 0.5;
});

// ANIMATION LOOP
function animate() {
    requestAnimationFrame(animate);

    particlesMesh.rotation.y += 0.0008;

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
