<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cyber Silhouette</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle, #0f2027, #000);
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 8;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// LIGHT
const light = new THREE.DirectionalLight(0x00ffff, 2);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

// BLACK MATERIAL
const material = new THREE.MeshStandardMaterial({
  color:0x000000,
  emissive:0x00ffff,
  emissiveIntensity:0.2,
  roughness:0.5
});

// HEAD
const head = new THREE.Mesh(new THREE.CylinderGeometry(1,1,2.5,32), material);
head.position.y = 3;
scene.add(head);

// BODY
const body = new THREE.Mesh(new THREE.BoxGeometry(2.5,4,1.5), material);
body.position.y = 0;
scene.add(body);

// LEGS
const legGeo = new THREE.BoxGeometry(0.8,3,0.8);

const leftLeg = new THREE.Mesh(legGeo, material);
leftLeg.position.set(-0.7,-3,0);
scene.add(leftLeg);

const rightLeg = new THREE.Mesh(legGeo, material);
rightLeg.position.set(0.7,-3,0);
scene.add(rightLeg);

// ARMS
const armGeo = new THREE.BoxGeometry(0.7,3,0.7);

const leftArm = new THREE.Mesh(armGeo, material);
leftArm.position.set(-2,1,0);
scene.add(leftArm);

const rightArm = new THREE.Mesh(armGeo, material);
rightArm.position.set(2,1,0);
scene.add(rightArm);

// ROTATE FULL BODY
document.addEventListener('mousemove', (e)=>{
  const x = (e.clientX / window.innerWidth - 0.5) * 2;
  head.rotation.y = x;
  body.rotation.y = x;
  leftLeg.rotation.y = x;
  rightLeg.rotation.y = x;
  leftArm.rotation.y = x;
  rightArm.rotation.y = x;
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
