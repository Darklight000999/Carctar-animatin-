<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cyber Character</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at center,#1fa2a6,#0f2027);
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Load your exact image
const textureLoader = new THREE.TextureLoader();
textureLoader.load('character.png', function(texture){

  const geometry = new THREE.PlaneGeometry(4,8);
  const material = new THREE.MeshBasicMaterial({
    map:texture,
    transparent:true
  });

  const character = new THREE.Mesh(geometry, material);
  scene.add(character);

  document.addEventListener('mousemove', (e)=>{
    const x = (e.clientX / window.innerWidth - 0.5) * 2;
    character.rotation.y = x * 0.8;
  });

  function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
  }
  animate();
});

</script>

</body>
</html>
