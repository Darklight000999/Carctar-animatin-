<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Silhouette 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #0f2027, #000);
}
</style>
</head>
<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f2027);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const light1 = new THREE.DirectionalLight(0x00ffff, 2);
light1.position.set(5,5,5);
scene.add(light1);

const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

// Orbit Controls (Full 360° Rotate)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Load Your 3D Model (Exported from Blender)
const loader = new GLTFLoader();

loader.load('model.glb', function(gltf) {

    const model = gltf.scene;
    scene.add(model);

    model.traverse((child)=>{
        if(child.isMesh){
            child.material.color.set(0x000000);
            child.material.emissive = new THREE.Color(0x00ffff);
            child.material.emissiveIntensity = 0.15;
        }
    });

    model.scale.set(2,2,2);

    // Example: Head rotation control
    document.addEventListener('mousemove', (e)=>{
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        model.rotation.y = x * 0.5;
    });

});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
